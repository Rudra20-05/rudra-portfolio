<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA — AI Assistant | Rudra Dalvi</title>
    <meta name="description" content="Chat with NOVA, Rudra Dalvi's AI assistant. Ask about his projects, skills, education, and more.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nova.css">
</head>

<body>
    <!-- Noise Overlay -->
    <div class="noise-overlay"></div>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <a href="index.html" class="nav-logo">RD<span class="logo-dot">.</span></a>
        <div class="nav-links">
            <a href="index.html#home" class="nav-link">Home</a>
            <a href="index.html#about" class="nav-link">About</a>
            <a href="index.html#skills" class="nav-link">Skills</a>
            <a href="index.html#projects" class="nav-link">Projects</a>
            <a href="index.html#journey" class="nav-link">Journey</a>
            <a href="index.html#contact" class="nav-link">Contact</a>
            <a href="nova.html" class="nav-link nav-nova active">🤖 NOVA</a>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="theme-icon icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="theme-icon icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </nav>

    <!-- NOVA Chat Page -->
    <main class="nova-page">
        <!-- Hero Header -->
        <div class="nova-hero">
            <div class="nova-avatar">
                <div class="nova-avatar-glow"></div>
                <span>🤖</span>
            </div>
            <h1 class="nova-title">NOVA</h1>
            <p class="nova-subtitle">AI assistant for Rudra</p>
        </div>

        <!-- Chat Container -->
        <div class="nova-chat-container" id="novaChatContainer">
            <div class="nova-messages" id="novaMessages">
                <!-- Welcome state with suggestions -->
                <div class="nova-welcome" id="novaWelcome">
                    <p class="nova-welcome-text">Ask anything about Rudra or his work</p>
                    <div class="nova-suggestions" id="novaSuggestions">
                        <button class="nova-chip" data-question="Who is Rudra?">Who is Rudra?</button>
                        <button class="nova-chip" data-question="What projects has he built?">What projects has he built?</button>
                        <button class="nova-chip" data-question="What's his tech stack?">What's his tech stack?</button>
                        <button class="nova-chip" data-question="Is he open to opportunities?">Is he open to opportunities?</button>
                        <button class="nova-chip" data-question="What's his education?">What's his education?</button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="nova-input-area">
                <input type="text" id="novaInput" placeholder="Ask about Rudra's projects, skills, or stack..." autocomplete="off">
                <button id="novaSend" class="nova-send-btn" aria-label="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <p class="nova-hint">Enter to send · Shift+Enter for new line</p>
        </div>
    </main>

    <!-- Edge Glow Overlays -->
    <div class="edge-glow edge-glow-tl"></div>
    <div class="edge-glow edge-glow-br"></div>

    <!-- Flashlight Overlay -->
    <div class="flashlight-overlay" id="flashlightOverlay"></div>

    <script src="nova.js"></script>
</body>

</html>
